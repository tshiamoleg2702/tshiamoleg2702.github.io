name: Sync GitVitae Template

# Manually triggered from your repository's Actions tab.
# Run this when you want to pull in the latest GitVitae features.
# Your portfolio.config.yaml is ALWAYS preserved — it is never overwritten.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to merge the latest GitVitae template into your portfolio"
        required: true
        default: ""

jobs:
  sync:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your portfolio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Save your personal config
        run: cp portfolio.config.yaml /tmp/my-portfolio-config.yaml

      - name: Add GitVitae upstream remote
        run: git remote add git-vitae https://github.com/git-vitae/git-vitae.github.io || true

      - name: Fetch latest template
        run: git fetch git-vitae main

      - name: Merge template updates
        run: |
          git merge git-vitae/main \
            --allow-unrelated-histories \
            --no-edit \
            -m "chore: sync GitVitae template updates" \
          || (echo "Merge conflict — restoring config and aborting" && git merge --abort && exit 1)

      - name: Restore your personal config (never overwritten)
        run: |
          cp /tmp/my-portfolio-config.yaml portfolio.config.yaml
          git add portfolio.config.yaml
          git diff --staged --quiet || git commit --amend --no-edit

      - name: Push to your repository
        run: git push origin ${{ github.ref_name }}

      - name: Done
        run: |
          echo ""
          echo "✓ GitVitae template synced successfully."
          echo "  Your portfolio.config.yaml has been preserved."
          echo "  GitHub Pages will redeploy in 1–2 minutes."
